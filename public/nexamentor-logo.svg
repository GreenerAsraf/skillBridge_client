<svg width="520" height="160" viewBox="0 0 520 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NexaMentor Logo</title>
  <desc id="desc">A modern NexaMentor wordmark with an abstract mentor path icon.</desc>
  <defs>
    <linearGradient id="markGradient" x1="18" y1="18" x2="142" y2="142" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34D399"/>
      <stop offset="0.48" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="wordGradient" x1="170" y1="42" x2="492" y2="118" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.55" stop-color="#CFFAFE"/>
      <stop offset="1" stop-color="#A5B4FC"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="160" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="18" y="18" width="124" height="124" rx="30" fill="#0F172A"/>
    <rect x="18" y="18" width="124" height="124" rx="30" fill="url(#markGradient)" fill-opacity="0.18"/>
    <path d="M49 105V57.5C49 52.8 54.6 50.4 58 53.7L101.3 97C104.6 100.3 102.3 106 97.5 106H77.6" stroke="url(#markGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M111 55V102.5C111 107.2 105.4 109.6 102 106.3L58.7 63C55.4 59.7 57.7 54 62.5 54H82.4" stroke="url(#markGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="80" cy="80" r="12" fill="#F8FAFC"/>
    <path d="M68 123C72.8 115.5 87.2 115.5 92 123" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round"/>
  </g>

  <text x="168" y="82" fill="url(#wordGradient)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="46" font-weight="800" letter-spacing="0">NexaMentor</text>
  <text x="171" y="113" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500" letter-spacing="1.8">MENTOR-LED LEARNING</text>
</svg>
